name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main        # trigger mỗi khi push lên main
  workflow_dispatch: # cho phép chạy thủ công trên GitHub UI

permissions:
  contents: write   # cần write để gh-pages push sang branch gh-pages

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Node (dùng version khớp với local của bạn)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build
      - name: Build
        run: npm run build

      # 5. Deploy thư mục dist lên branch gh-pages
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist